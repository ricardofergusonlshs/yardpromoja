<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" role="img" aria-labelledby="title desc">
  <title id="title">Jamaica parish map</title>
  <desc id="desc">Stylized map of Jamaica with parish markers.</desc>
  <defs>
    <linearGradient id="island" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#24462f"/>
      <stop offset="0.52" stop-color="#1d3327"/>
      <stop offset="1" stop-color="#14241d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="760" height="380" rx="28" fill="#08110d"/>
  <path filter="url(#softShadow)" fill="url(#island)" stroke="#9fb6a2" stroke-width="2.5" d="M57 185c39-34 87-43 136-38 41 4 70-16 105-28 42-14 88-18 132-8 36 8 60 30 93 42 38 14 76 3 111 16 26 10 46 29 65 50-31 23-71 33-111 29-39-5-74 10-111 19-49 13-99 18-149 12-44-5-86-20-130-16-45 4-88 15-130 2-24-7-42-24-58-43 13-11 28-24 47-37z"/>
  <path fill="none" stroke="#4d6857" stroke-width="1.4" opacity=".85" d="M145 154l31 108M227 138l-7 130M306 120l-28 154M383 113l-5 168M457 132l-18 139M529 160l-26 97M604 170l-27 75"/>
