<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>YardPromo Jamaica | Find What’s Happening</title>
  <meta name="description" content="Discover Jamaican events, promos, venues, campaigns, and local deals — or post your own promo link."/>
  <meta property="og:title" content="YardPromo Jamaica"/>
  <meta property="og:description" content="Find what’s happening in Jamaica or post your own promo link."/>

  <link rel="apple-touch-icon" href="assets/yardpromo-app-icon.png"/>

  <style>
    *{box-sizing:border-box}
    :root{
      --green:#008a3d;
      --green-dark:#064e3b;
      --gold:#f7c600;
      --ink:#07111f;
      --muted:#64748b;
      --line:#e2e8f0;
      --soft:#f8fafc;
      --white:#fff;
      --danger:#b42318;
      --radius:22px;
      --shadow:0 18px 50px rgba(15,23,42,.10);
    }
    html{scroll-behavior:smooth}
    body{margin:0;background:#f8fafc;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    img{display:block;max-width:100%}
    .container{width:min(1160px,calc(100% - 32px));margin:0 auto}
    .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(18px)}
    .nav{min-height:76px;display:flex;align-items:center;justify-content:space-between;gap:18px}
    .brand{border:0;background:transparent;display:flex;align-items:center;gap:12px;text-align:left}
    .brand-mark{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;color:white;background:linear-gradient(135deg,var(--green),var(--green-dark));font-weight:1000;letter-spacing:-.06em}
    .brand strong{display:block;font-size:21px;letter-spacing:-.05em}
    .brand small{display:block;color:var(--muted);font-size:12px;font-weight:850}
    .nav-links{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
    .nav-links button{border:0;background:transparent;padding:10px 12px;border-radius:14px;color:#475569;font-size:14px;font-weight:900}
    .nav-links button:hover,.nav-links button.active{background:#fff4bf;color:#111827}
    .mobile-menu{display:none;width:100%;gap:8px;overflow-x:auto;padding:0 0 14px}
    .mobile-menu button{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:9px 12px;font-weight:900;color:#475569}
    .mobile-menu button.active{background:var(--gold);color:#111827}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:11px 15px;border-radius:16px;border:0;font-weight:950;white-space:nowrap}
    .btn-primary{background:linear-gradient(135deg,var(--green),var(--green-dark));color:white}
    .btn-gold{background:var(--gold);color:#111827}
    .btn-light{background:white;color:#334155;border:1px solid var(--line)}
    .btn-danger{background:var(--danger);color:white}
    .hero{background:radial-gradient(circle at 14% 12%,rgba(0,138,61,.40),transparent 32%),radial-gradient(circle at 88% 78%,rgba(247,198,0,.22),transparent 34%),linear-gradient(135deg,#070b13 0%,#07111f 52%,#022c22 100%);color:white}
    .hero-grid{min-height:540px;padding:70px 0;display:grid;grid-template-columns:1.05fr .95fr;align-items:center;gap:44px}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.10);padding:9px 13px;border-radius:999px;font-weight:950;font-size:14px}
    h1{margin:18px 0 0;font-size:clamp(40px,6.3vw,72px);line-height:.95;letter-spacing:-.072em}
    h2{margin:8px 0 0;font-size:clamp(28px,4.2vw,46px);line-height:1;letter-spacing:-.055em}
    h3{margin:0;font-size:22px;letter-spacing:-.035em}
    p{line-height:1.65}
    .hero p{max-width:620px;color:#d1d5db;font-size:18px;margin:22px 0 0}
    .hero-actions,.action-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
    .hero-card{background:white;color:var(--ink);border-radius:28px;overflow:hidden;box-shadow:0 28px 90px rgba(0,0,0,.24)}
    .hero-card img{height:300px;width:100%;object-fit:cover}
    .hero-card div{padding:22px}
    .section{padding:54px 0}
    .section-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:26px}
    .kicker{margin:0;color:var(--green);font-size:12px;font-weight:1000;text-transform:uppercase;letter-spacing:.09em}
    .muted{color:var(--muted)}
    .small{font-size:13px}
    .grid{display:grid;gap:22px}
    .grid-2{grid-template-columns:repeat(2,1fr)}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .grid-4{grid-template-columns:repeat(4,1fr)}
    .card,.panel,.form-card,.stat,.price-card,.category-card,.profile-card,.venue-card,.campaign-card,.share-preview-card{background:white;border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 4px 14px rgba(15,23,42,.04)}
    .card,.campaign-card{overflow:hidden}
    .card-img{height:230px;background:#e2e8f0;position:relative}
    .card-img img,.campaign-card img{width:100%;height:100%;object-fit:cover}
    .campaign-card img{height:190px}
    .card-body,.campaign-body{padding:20px}
    .card h3{margin-top:8px}
    .meta{color:var(--green);font-size:12px;font-weight:1000;text-transform:uppercase;letter-spacing:.08em}
    .details{display:grid;gap:7px;margin:14px 0;color:#475569;font-size:14px;font-weight:750}
    .date-pill{position:absolute;left:12px;bottom:12px;background:rgba(255,255,255,.96);border-radius:14px;padding:8px 11px;color:#111827;font-size:13px;font-weight:950}
    .featured-tag{position:absolute;top:12px;left:12px;background:var(--gold);color:#111827;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:1000}
    .tag{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;background:#f1f5f9;color:#475569}
    .tag.green{background:#ecfdf5;color:#047857}.tag.gold{background:#fff4bf;color:#7a5b00}.tag.red{background:#fff1f2;color:#be123c}
    .panel,.form-card,.stat,.price-card,.profile-card,.venue-card,.share-preview-card{padding:24px}
    .category-card{padding:22px;text-align:left}
    .category-card strong{display:block;margin-top:6px}
    .filters{display:grid;grid-template-columns:1fr 180px 180px 150px;gap:12px;margin-bottom:24px}
    label{display:grid;gap:7px;color:#334155;font-size:14px;font-weight:900}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:15px;padding:12px 13px;outline:none;background:white}
    input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 4px #dcfce7}
    .form-grid{display:grid;gap:18px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .form-section{border-top:1px solid var(--line);padding-top:18px}
    .form-section:first-child{border-top:0;padding-top:0}
    .upload-box{border:2px dashed #86efac;background:#f0fdf4;border-radius:20px;padding:16px}
    .layout-2{display:grid;grid-template-columns:1fr 360px;gap:26px;align-items:start}
    .detail-shell{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(330px,.95fr);gap:28px;align-items:start}
    .detail-image{border-radius:28px;overflow:hidden;background:#e2e8f0;box-shadow:var(--shadow)}
    .detail-image img{width:100%;max-height:760px;object-fit:cover}
    .detail-panel{background:white;border:1px solid var(--line);border-radius:28px;padding:26px;box-shadow:0 8px 28px rgba(15,23,42,.06)}
    .promo-title{font-size:clamp(34px,4.5vw,56px);line-height:1;letter-spacing:-.065em;color:#07111f}
    .primary-actions{border:1px solid var(--line);background:#fbfdff;border-radius:24px;padding:16px;margin-top:20px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-items:center}
    .primary-actions .btn{width:100%}
    .more-actions{margin-top:16px}
    .more-actions details{border:1px solid var(--line);background:white;border-radius:22px;padding:14px}
    .more-actions summary{font-weight:1000;cursor:pointer;color:#07111f}
    .more-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .trust-row{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
    .trust-row span{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;color:#475569;font-size:13px;font-weight:900}
    .engagement-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
    .engagement-stat{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px}
    .engagement-stat strong{display:block;font-size:24px;letter-spacing:-.04em;color:#07111f}
    .engagement-stat span{display:block;color:#64748b;font-size:13px;font-weight:850}
    .guest-meter{height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:10px 0}
    .guest-meter span{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:999px}
    .social-proof{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
    .proof-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 10px;background:#f8fafc;border:1px solid var(--line);color:#475569;font-size:13px;font-weight:900}
    .qr-box{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;width:150px;height:150px;background:white;border:10px solid white;border-radius:16px;box-shadow:0 8px 24px rgba(15,23,42,.10)}
    .qr-dot{background:#07111f;border-radius:2px}.qr-dot.off{background:white}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
    .calendar-head{background:#07111f;color:white;padding:10px;border-radius:14px;text-align:center;font-size:12px;font-weight:1000;text-transform:uppercase}
    .calendar-day{min-height:120px;background:white;border:1px solid var(--line);border-radius:18px;padding:12px}
    .calendar-day.muted-day{opacity:.35;background:#f1f5f9}
    .calendar-event{margin-top:8px;border:0;border-radius:12px;background:#ecfdf5;color:#064e3b;padding:8px;text-align:left;width:100%;font-size:12px;font-weight:900}
    .event-row,.rank-row,.inquiry-row,.claim-row,.rsvp-row,.interest-row{display:grid;grid-template-columns:80px 1fr auto;gap:14px;align-items:center;background:white;border:1px solid var(--line);border-radius:20px;padding:14px}
    .event-date{background:#07111f;color:white;border-radius:16px;padding:10px;text-align:center;font-weight:1000}
    .event-date small{display:block;color:#cbd5e1;text-transform:uppercase}
    .rank-row{grid-template-columns:56px 70px 1fr 120px auto}
    .rank-number{width:44px;height:44px;display:grid;place-items:center;border-radius:14px;background:#07111f;color:white;font-weight:1000}
    .rank-img{width:64px;height:64px;border-radius:16px;object-fit:cover}
    .score{font-weight:1000;color:#047857;background:#ecfdf5;border-radius:999px;padding:8px 10px;text-align:center}
    .profile-hero{display:grid;grid-template-columns:130px 1fr auto;gap:22px;align-items:center}
    .avatar{width:130px;height:130px;border-radius:28px;object-fit:cover;background:#e2e8f0}
    .profile-links{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px}
    .map-box{height:320px;border-radius:22px;background:#e2e8f0;overflow:hidden;border:1px solid var(--line);box-shadow:0 4px 14px rgba(15,23,42,.04)}
    .map-box iframe{width:100%;height:100%;border:0;display:block}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .tabs button{border:1px solid var(--line);background:white;border-radius:999px;padding:10px 13px;font-weight:950;color:#475569}
    .tabs button.active{background:var(--gold);color:#111827}
    .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:20px}
    table{width:100%;min-width:860px;border-collapse:collapse;background:white}
    th,td{padding:14px;border-bottom:1px solid var(--line);text-align:left}
    th{background:#f8fafc;color:#64748b;font-size:12px;text-transform:uppercase;letter-spacing:.08em}
    .row-ad{display:flex;align-items:center;gap:12px}
    .row-ad img{width:50px;height:50px;border-radius:14px;object-fit:cover}
    .status{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;background:#f1f5f9;color:#475569}
    .status.active,.status.confirmed{background:#ecfdf5;color:#047857}
    .status.pending,.status.new{background:#fffbeb;color:#b45309}
    .status.rejected,.status.cancelled{background:#fff1f2;color:#be123c}
    .campaign-type{display:inline-flex;border-radius:999px;background:#ecfdf5;color:#047857;padding:6px 10px;font-size:12px;font-weight:1000}
    .modal-backdrop{position:fixed;inset:0;z-index:100;background:rgba(7,17,31,.58);display:grid;place-items:center;padding:20px}
    .modal{width:min(720px,100%);max-height:88vh;overflow:auto;background:white;border-radius:26px;padding:24px;box-shadow:var(--shadow)}
    .modal-head{display:flex;justify-content:space-between;gap:16px;align-items:start;margin-bottom:18px}
    .close{border:0;background:#f1f5f9;border-radius:999px;width:38px;height:38px;font-weight:1000}
    .mini-success{border:1px solid #bbf7d0;background:#f0fdf4;color:#047857;border-radius:16px;padding:12px 14px;font-weight:900;margin-top:12px}
    .caption-box{width:100%;min-height:130px;border:1px solid var(--line);border-radius:14px;padding:12px;background:#f8fafc}
    .whatsapp-mock{max-width:430px;margin:auto;background:#efe7dc;border:12px solid #07111f;border-radius:42px;overflow:hidden;box-shadow:0 28px 70px rgba(15,23,42,.24)}
    .whatsapp-head{background:white;padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e5e7eb}
    .mock-avatar{width:44px;height:44px;border-radius:50%;background:#07111f;color:#fed100;display:grid;place-items:center;font-weight:1000}
    .chat-area{padding:18px;min-height:500px;background:#f6efe7}
    .chat-bubble{background:#d9fdd3;border-radius:18px 18px 4px 18px;padding:14px;margin-left:30px;box-shadow:0 1px 1px rgba(0,0,0,.08)}
    .link-card{background:white;border-radius:16px;overflow:hidden;margin-top:10px;display:grid;grid-template-columns:130px 1fr;border:1px solid #e5e7eb}
    .link-card img{width:130px;height:130px;object-fit:cover}.link-info{padding:12px}.link-info strong{display:block;font-size:18px;line-height:1.1}.link-info span{display:block;color:#64748b;margin-top:6px;font-size:13px}.link-info small{display:block;color:#008069;margin-top:10px;font-weight:850}
    .status-mock{max-width:380px;margin:auto;background:#050a08;border:12px solid #07111f;border-radius:42px;overflow:hidden;color:white;box-shadow:0 28px 70px rgba(15,23,42,.24)}
    .status-content{height:690px;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.92)),var(--status-img);background-size:cover;background-position:center;position:relative;padding:18px}
    .status-bars{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:14px}.status-bars span{height:3px;background:rgba(255,255,255,.75);border-radius:999px}
    .status-title{position:absolute;left:22px;right:22px;bottom:160px;text-align:center}.status-title h2{font-size:52px;color:white;text-shadow:0 3px 15px rgba(0,0,0,.55)}.status-title p{color:#fff;font-weight:900;margin:8px 0}
    .status-cta{position:absolute;left:48px;right:48px;bottom:74px;background:rgba(0,0,0,.62);border:1px solid var(--gold);border-radius:18px;text-align:center;padding:14px;font-weight:1000;color:white}
    .status-reply{display:flex;align-items:center;gap:10px;padding:14px}.reply-pill{flex:1;background:rgba(255,255,255,.12);border-radius:999px;padding:12px 18px;color:#cbd5e1}
    .empty{padding:34px;text-align:center;border:1px dashed #cbd5e1;border-radius:22px;background:#fff}
    .footer{border-top:1px solid var(--line);background:white}
    .footer-inner{padding:32px 0;display:grid;grid-template-columns:1fr auto;gap:24px;color:var(--muted);font-size:14px}
    .footer-links{display:flex;gap:16px;flex-wrap:wrap}
    .footer-links button{border:0;background:transparent;color:#475569;font-weight:850;padding:0}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#07111f;color:white;border-radius:16px;padding:12px 15px;box-shadow:var(--shadow);z-index:120;font-weight:900}
    @media(max-width:980px){
      .desktop-only{display:none}.mobile-menu{display:flex}.nav{align-items:flex-start;flex-direction:column;padding:14px 0 0}
      .hero-grid,.layout-2,.detail-shell,.filters,.profile-hero{grid-template-columns:1fr}
      .grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}
      .calendar-grid{grid-template-columns:1fr}.calendar-head,.calendar-day.muted-day{display:none}.calendar-day{min-height:auto}
      .rank-row,.event-row,.inquiry-row,.claim-row,.rsvp-row,.interest-row{grid-template-columns:1fr}
      .rank-img{width:100%;height:170px}.avatar{width:110px;height:110px}
      .footer-inner{grid-template-columns:1fr}
    }
    @media(max-width:640px){
      .grid-2,.grid-3,.grid-4,.form-row,.engagement-strip,.primary-actions,.more-grid{grid-template-columns:1fr}
      .section-head{align-items:stretch;flex-direction:column}
      .hero-grid{min-height:auto;padding:56px 0}.hero-card img{height:220px}
      .btn{width:100%}.action-row{width:100%}
    }
  
    /* Vibrant premium upgrade */
    body{
      background:
        radial-gradient(circle at 8% 8%,rgba(247,198,0,.10),transparent 24%),
        radial-gradient(circle at 92% 18%,rgba(0,138,61,.10),transparent 28%),
        linear-gradient(180deg,#fffbea 0%,#f8fafc 34%,#f8fafc 100%);
    }
    .header{box-shadow:0 10px 30px rgba(15,23,42,.04)}
    .brand-mark{box-shadow:0 10px 26px rgba(0,138,61,.24)}
    .hero{position:relative;overflow:hidden}
    .hero:before{
      content:"";position:absolute;inset:0;pointer-events:none;opacity:.26;
      background-image:
        linear-gradient(45deg,rgba(255,255,255,.05) 25%,transparent 25%),
        linear-gradient(-45deg,rgba(255,255,255,.05) 25%,transparent 25%);
      background-size:34px 34px;
    }
    .hero:after{
      content:"";position:absolute;right:-120px;top:-120px;width:420px;height:420px;border-radius:999px;
      background:radial-gradient(circle,rgba(247,198,0,.26),transparent 65%);
      filter:blur(2px);
    }
    .hero-grid{position:relative;z-index:1}
    .hero-actions .btn-gold{animation:softPulse 2.6s ease-in-out infinite;box-shadow:0 0 0 rgba(247,198,0,.35)}
    @keyframes softPulse{
      0%,100%{box-shadow:0 0 0 0 rgba(247,198,0,.32);transform:translateY(0)}
      50%{box-shadow:0 0 0 10px rgba(247,198,0,0);transform:translateY(-1px)}
    }
    .btn,.card,.category-card,.campaign-card,.share-preview-card,.panel,.form-card,.venue-card,.profile-card,.price-card{
      transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease,background .22s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .card:hover,.category-card:hover,.campaign-card:hover,.share-preview-card:hover{
      transform:translateY(-5px);
      box-shadow:0 18px 46px rgba(15,23,42,.12);
      border-color:rgba(0,138,61,.22);
    }
    .card-img{height:250px}
    .card-img:after{
      content:"";position:absolute;inset:auto 0 0 0;height:45%;
      background:linear-gradient(180deg,transparent,rgba(7,17,31,.55));
      pointer-events:none;
    }
    .date-pill,.featured-tag{z-index:2}
    .featured-tag{
      background:linear-gradient(135deg,#f7c600,#ffe784);
      box-shadow:0 10px 20px rgba(247,198,0,.25);
    }
    .date-pill{box-shadow:0 10px 20px rgba(15,23,42,.12)}
    .card-body{background:linear-gradient(180deg,#fff,#fffefa)}
    .card .btn-primary{width:100%;margin-top:4px}
    .promo-mini-stats{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
    .promo-mini-stats span{
      display:inline-flex;border-radius:999px;background:#f8fafc;border:1px solid var(--line);
      color:#475569;font-size:12px;font-weight:900;padding:6px 9px;
    }
    .location-chip{
      display:inline-flex;border-radius:999px;background:#ecfdf5;color:#047857;
      padding:5px 9px;font-size:12px;font-weight:1000;margin-top:8px;
    }
    .page-hero{
      background:
        radial-gradient(circle at 12% 20%,rgba(247,198,0,.20),transparent 26%),
        radial-gradient(circle at 90% 20%,rgba(0,138,61,.20),transparent 28%),
        linear-gradient(135deg,#07111f,#064e3b);
      color:white;border-radius:32px;padding:38px;margin-bottom:26px;overflow:hidden;position:relative;
      box-shadow:0 20px 60px rgba(7,17,31,.16);
    }
    .page-hero p{color:#d1d5db;max-width:720px}
    .quick-chips{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 24px}
    .chip{

      content:"";
      position:absolute;
      inset:0;
      transform:translateX(-120%);
      background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.45) 45%,transparent 62%);
      animation:bannerShine 4.5s ease-in-out infinite;
      pointer-events:none;
    }
    .launch-banner:after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:2px;
      background:linear-gradient(90deg,transparent,#07111f,transparent);
      opacity:.18;
      animation:bannerLineMove 5.5s linear infinite;
      pointer-events:none;

    @keyframes bannerLineMove{

      100%{transform:translateX(100%)}

    @keyframes bannerTextLift{

    @keyframes bannerButtonPulse{

    @media (prefers-reduced-motion: reduce){

      .launch-banner:after,
      .launch-banner strong,
      .launch-banner button{
        animation:none!important;

function generateQR(slug){let hash=0;for(let i=0;i<slug.length;i++)hash=(hash*31+slug.charCodeAt(i))&0xffffffff;let out="";for(let i=0;i<81;i++){const finder=(i<21&&i%9<3)||(i<27&&i%9>5)||(i>53&&i%9<3);const on=finder||(((hash>>(i%24))+i*7)%3===0);out+=`<span class="qr-dot ${on?'':'off'}"></span>`}return `<div class="qr-box">${out}</div>`}


function supportLabel(ad){
  const c=String(ad.category||"").toLowerCase();
  if(c.includes("party") || c.includes("dancehall") || c.includes("nightlife")) return "Support This Party";
  if(ad.event_date) return "Support This Event";
  if(c.includes("business") || c.includes("food") || c.includes("fashion") || c.includes("services")) return "Support This Business";
  if(c.includes("venue")) return "Support This Venue";
  if(c.includes("campaign")) return "Support This Campaign";
  return "Support This Promo";
}
function logSupport(slug,type){
  support_events=[{id:Date.now(),promo_slug:slug,type,session_id:sessionKey(),created_at:new Date().toLocaleString()},...support_events];
  const ad=ads.find(a=>a.slug===slug);
  if(ad){if(type==="whatsapp_share") ad.shares=Number(ad.shares||0)+1;if(type==="ticket") ad.clicks=Number(ad.clicks||0)+1;}
  saveAll();
}
function supportCount(slug){return support_events.filter(e=>e.promo_slug===slug).length + interestCount(slug) + rsvpCount(slug)}
function supportAction(slug,type){
  const ad=ads.find(a=>a.slug===slug)||{};
  logSupport(slug,type);
  if(type==="interested"){closeModal();clickInterest(slug);return}
  if(type==="rsvp"){closeModal();openRsvp(slug);return}
  if(type==="whatsapp_share"){window.open("https://wa.me/?text="+encodeURIComponent(shareCaptionForAd(ad)),"_blank");toast("Thanks for supporting");return}
  if(type==="invite"){navigator.clipboard?.writeText(publicAdUrl(slug));toast("Promo link copied");return}
  if(type==="ticket"){if(ad.website_link) window.open(ad.website_link,"_blank");toast("Opening promo link");return}
  if(type==="follow"){if(ad.promoter_slug) savePromoter(ad.promoter_slug);toast("Promoter saved");return}
  if(type==="save"){savePromo(slug);toast("Promo saved");return}
  if(type==="alerts"){closeModal();openYardAlerts("promo",slug);return}
}

function heatScore(ad){return Math.max(8,Math.min(100,Math.round((Number(ad.views||0)/280)+(Number(ad.clicks||0)*.26)+(Number(ad.shares||0)*.72)+(interestCount(ad.slug)*.18)+(rsvpCount(ad.slug)*.35)+(supportCount(ad.slug)*.22)+(ad.is_featured?10:0))))}
function shortLinkForAd(ad){return "yardpromo.com/p/"+String(ad.slug||"promo").split("-").slice(0,3).join("-")}
function shortLinkForCampaign(c){return "yardpromo.com/c/"+String(c.slug||"campaign").split("-").slice(0,3).join("-")}

function getParishStats(parish){
  const list=activeAds().filter(a=>a.parish===parish || (parish==="Montego Bay"&&a.location==="Montego Bay") || (parish==="Portmore"&&a.location?.includes("Portmore")) || (parish==="Ocho Rios"&&a.location?.includes("Ocho")) || (parish==="Spanish Town"&&a.location?.includes("Spanish")));
  const top=[...list].sort((a,b)=>interestCount(b.slug)-interestCount(a.slug))[0]||activeAds()[0];
  const rsvpTop=[...list].sort((a,b)=>rsvpCount(b.slug)-rsvpCount(a.slug))[0]||top;
  const cats={};list.forEach(a=>cats[a.category]=(cats[a.category]||0)+1);
  const topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0]?.[0]||"Events";
  return {list,top,rsvpTop,topCat}
}

function openCalendarModal(slug){const ad=ads.find(a=>a.slug===slug);const start=(ad.event_date||"2026-05-22").replaceAll("-","")+(ad.event_time?("T"+ad.event_time.replace(":","")+"00"):"T180000");const end=(ad.event_date||"2026-05-22").replaceAll("-","")+"T235900";const url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ad.title)}&dates=${start}/${end}&details=${encodeURIComponent(ad.description+" "+publicAdUrl(ad.slug))}&location=${encodeURIComponent((ad.venue||"")+" "+(ad.location||"")+" "+(ad.parish||""))}`;openModal("Add to Calendar",`<div class="form-grid"><a class="btn btn-primary" href="${url}" target="_blank">Google Calendar</a><button class="btn btn-light" onclick="downloadText('${ad.slug}.ics','BEGIN:VCALENDAR\\nVERSION:2.0\\nBEGIN:VEVENT\\nSUMMARY:${ad.title}\\nEND:VEVENT\\nEND:VCALENDAR')">Download iCal</button><a class="btn btn-light" href="${url}" target="_blank">Outlook Calendar</a></div>`)}
function openCaption(slug){const ad=ads.find(a=>a.slug===slug);openModal("Promo Caption",`<div class="form-grid"><p class="muted">Create ready-to-share captions for WhatsApp, Instagram, Facebook, TikTok, and SMS.</p><label>Platform<select id="captionPlatform"><option>WhatsApp</option><option>Instagram</option><option>TikTok</option><option>Facebook</option><option>SMS</option></select></label><label>Tone<select id="captionTone"><option>Professional</option><option>Short and direct</option><option>Event reminder</option><option>Business promo</option></select></label><textarea id="captionOutput" class="caption-box" rows="7" readonly>${shareCaptionForAd(ad)}</textarea><div class="action-row"><button class="btn btn-primary" data-copy="${shareCaptionForAd(ad)}">Copy Caption</button><button class="btn btn-light" onclick="document.querySelector('#captionOutput').value=shareCaptionForAd(ads.find(a=>a.slug==='${slug}'))">Create Caption</button></div></div>`)}
function openSharePreviewTool(slug){const ad=ads.find(a=>a.slug===slug);openModal("Preview Share Link",`<div class="form-grid"><p class="muted">See how your link can appear when shared.</p><div class="tabs"><button class="active" onclick="renderPreviewMock('whatsapp','${slug}',this)">WhatsApp link</button><button onclick="renderPreviewMock('status','${slug}',this)">WhatsApp Status</button></div><div id="sharePreviewMock"></div><div class="action-row"><button class="btn btn-primary" data-copy="${publicAdUrl(slug)}">Copy link</button><a class="btn btn-gold" target="_blank" href="https://wa.me/?text=${encodeURIComponent(shareCaptionForAd(ad))}">Share on WhatsApp</a><button class="btn btn-light" onclick="downloadStory('${slug}')">Download story image</button><button class="btn btn-light" onclick="downloadPreview('${slug}')">Download preview image</button><button class="btn btn-light" onclick="toast('Preview refreshed')">Refresh Preview</button></div></div>`);renderPreviewMock("whatsapp",slug)}
function renderPreviewMock(type,slug,btn){document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));if(btn)btn.classList.add("active");const ad=ads.find(a=>a.slug===slug),title=ad.title,desc=shareDescriptionForAd(ad);let html="";if(type==="whatsapp"){html=`<div class="whatsapp-mock"><div class="whatsapp-head"><div class="mock-avatar">YP</div><div><strong>YardPromo</strong><br><span class="muted small">shared link</span></div></div><div class="chat-area"><div class="chat-bubble"><p style="margin:0 0 8px">Check out this promo on YardPromo</p><div class="link-card"><img src="${ad.poster_image_url}" alt="${title}"><div class="link-info"><strong>${title}</strong><span>${desc}</span><small>yardpromo.com/p/${ad.slug}</small></div></div></div></div></div>`}else{html=`<div class="status-mock"><div class="status-content" style="--status-img:url('${ad.poster_image_url}')"><div class="status-bars"><span></span><span></span><span></span><span></span></div><div style="display:flex;align-items:center;gap:10px"><div class="mock-avatar">YP</div><div><strong>YardPromo</strong><br><small>Today</small></div></div><div class="status-title"><h2>${title}</h2><p>${ad.category} • ${ad.location||ad.parish}</p><p>${ad.event_date?ad.event_date+(ad.event_time?" • "+ad.event_time:""):"View on YardPromo"}</p></div><div class="status-cta">VIEW ON YARDPROMO<br><span class="small">TAP LINK</span></div></div><div class="status-reply"><div class="reply-pill">Reply</div><span>♡</span><span>↗</span></div></div>`}document.querySelector("#sharePreviewMock").innerHTML=html}
function openClaim(slug){const ad=ads.find(a=>a.slug===slug);openModal("Claim This Event",`<form id="claimForm" class="form-grid"><div class="form-row"><label>Full name<input name="name" required></label><label>Promoter/business name<input name="business" required></label></div><div class="form-row"><label>Email<input name="email" type="email" required></label><label>Phone / WhatsApp<input name="phone" required></label></div><label>Relationship<select name="relationship"><option>Promoter</option><option>Venue owner</option><option>Artist</option><option>Vendor</option><option>Staff</option><option>Other</option></select></label><label>Proof message<textarea name="message" rows="4" required></textarea></label><button class="btn btn-primary">Submit Claim</button></form>`);document.querySelector("#claimForm").addEventListener("submit",e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());claims=[{id:Date.now(),type:"event",target_slug:slug,target_title:ad.title,status:"Pending review",created_at:new Date().toLocaleString(),...data},...claims];saveAll();closeModal();toast("Claim submitted for review.")})}
function openVenueClaim(slug){const v=getVenue(slug);openModal("Claim This Venue",`<form id="venueClaimForm" class="form-grid"><label>Full name<input name="name" required></label><label>Business / venue role<input name="business" required></label><label>Email<input name="email" type="email" required></label><label>Phone / WhatsApp<input name="phone" required></label><label>Message<textarea name="message" rows="4" required>I want to claim ${v.name}</textarea></label><button class="btn btn-primary">Submit Claim</button></form>`);document.querySelector("#venueClaimForm").addEventListener("submit",e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());claims=[{id:Date.now(),type:"venue",target_slug:slug,target_title:v.name,status:"pending",created_at:new Date().toLocaleString(),relationship:"Venue owner",...data},...claims];saveAll();closeModal();toast("Venue claim submitted.")})}
function createPage(){return `<section class="section"><div class="container layout-2"><section class="form-card"><p class="kicker">Post Promo</p><h2>Create a promotion.</h2><p class="muted">Upload your poster, add the details, and submit your promo for review.</p><div class="onboarding-steps"><div class="onboarding-step"><div class="step-number">1</div><strong>Choose promo type</strong><p class="muted small">Event, business, service, product, deal, or venue.</p></div><div class="onboarding-step"><div class="step-number">2</div><strong>Upload poster</strong><p class="muted small">Make your promo visual and shareable.</p></div><div class="onboarding-step"><div class="step-number">3</div><strong>Preview & submit</strong><p class="muted small">Review your promo and open Share Pack.</p></div></div><form id="promoForm" class="form-grid" style="margin-top:22px"><div class="form-section"><h3>Basic Info</h3><div class="form-row" style="margin-top:14px"><label>Promo title<input name="title" required></label><label>Category<select name="category">${categories.map(c=>`<option>${c}</option>`).join("")}</select></label></div><label style="margin-top:14px">Description<textarea name="description" rows="4" required></textarea></label></div><div class="form-section"><h3>Poster</h3><label class="upload-box" style="margin-top:14px">Poster upload<input type="file" id="poster" accept="image/*"></label></div><div class="form-section"><h3>Event Details</h3><div class="form-row" style="margin-top:14px"><label>Event date<input type="date" name="event_date"></label><label>Event time<input type="time" name="event_time"></label></div><div class="form-row" style="margin-top:14px"><label>Parish<select name="parish">${parishes.map(p=>`<option>${p}</option>`).join("")}</select></label><label>Location / venue<input name="location" required></label></div><div class="form-row" style="margin-top:14px"><label>Price / entry fee<input name="price"></label><label>Guest list limit<input name="rsvp_limit" type="number" value="150"></label></div></div><div class="form-section"><h3>Contact & Links</h3><div class="form-row" style="margin-top:14px"><label>WhatsApp number<input name="whatsapp"></label><label>Website / ticket link<input name="website_link"></label></div><div class="form-row" style="margin-top:14px"><label>Instagram / TikTok link<input name="social_link"></label><label>Button text<input name="call_to_action" value="Learn More"></label></div></div><button class="btn btn-primary" type="submit">Submit for Review</button></form></section><aside class="panel"><h3>Preview</h3><p class="muted">Your poster preview will appear here.</p><div id="posterPreview" class="panel" style="margin-top:14px;background:#f8fafc">No poster selected</div><div class="panel" style="margin-top:18px"><h3>Posting checklist</h3><p class="muted small">Add date, parish, WhatsApp, and a clear call-to-action for better results.</p></div></aside></div></section>`}
function setupCreate(){const preview=document.querySelector("#posterPreview");document.querySelector("#poster").addEventListener("change",e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{uploadedImage=reader.result;preview.innerHTML=`<img src="${uploadedImage}" style="border-radius:18px">`};reader.readAsDataURL(file)});document.querySelector("#promoForm").addEventListener("submit",e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());const slug=slugify(data.title)+"-"+Date.now();const ad={id:Date.now(),slug,status:"pending",is_featured:false,is_weekly_pick:false,views:0,clicks:0,shares:0,interested_seed:0,rsvp_seed:0,guest_seed:0,vip_seed:0,birthday_seed:0,poster_image_url:uploadedImage||"https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1200&q=80",...data,venue:data.location,phone:"",promoter_slug:"island-vibes-promotions",posted_by:"user"};ads=[ad,...ads];saveAll();uploadedImage="";navigate("dashboard");toast("Promo submitted for review")})}
function dashboardPage(){const active=ads.filter(a=>a.status==="active").length,totalViews=ads.reduce((s,a)=>s+Number(a.views||0),0),totalRsvp=ads.reduce((s,a)=>s+rsvpCount(a.slug),0),totalInt=ads.reduce((s,a)=>s+interestCount(a.slug),0);return `<section class="section"><div class="container"><div class="section-head"><div><p class="kicker">Dashboard</p><h2>Advertiser dashboard.</h2></div><button class="btn btn-primary" data-route="create">Create Promo</button></div><div class="grid grid-4" style="margin-bottom:22px"><div class="stat"><p class="muted">Active Promos</p><h3>${active}</h3></div><div class="stat"><p class="muted">RSVPs</p><h3>${totalRsvp}</h3></div><div class="stat"><p class="muted">Interested</p><h3>${totalInt}</h3></div><div class="stat"><p class="muted">Views</p><h3>${totalViews.toLocaleString()}</h3></div></div><div class="tabs"><button class="active" onclick="renderDashboardTab('promos',this)">My Promos</button><button onclick="renderDashboardTab('rsvps',this)">RSVPs</button><button onclick="renderDashboardTab('interested',this)">Interested</button><button onclick="renderDashboardTab('support',this)">Support</button><button onclick="renderDashboardTab('inbox',this)">Inbox</button><button onclick="renderDashboardTab('campaigns',this)">Campaigns</button><button onclick="renderDashboardTab('share',this)">Share Pack</button><button onclick="renderDashboardTab('poster',this)">Poster Studio</button><button onclick="renderDashboardTab('boost',this)">Boost Preview</button><button onclick="renderDashboardTab('analytics',this)">Analytics</button><button onclick="renderDashboardTab('profile',this)">Profile</button></div><div id="dashboardContent"></div></div></section>`}
function renderDashboardTab(tab,btn){document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));if(btn)btn.classList.add("active");if(tab==="promos")document.querySelector("#dashboardContent").innerHTML=promoTable(false);if(tab==="rsvps")document.querySelector("#dashboardContent").innerHTML=rsvpDashboardList();if(tab==="interested")document.querySelector("#dashboardContent").innerHTML=interestedDashboardList();if(tab==="support")document.querySelector("#dashboardContent").innerHTML=supportDashboardHtml();if(tab==="inbox")document.querySelector("#dashboardContent").innerHTML=inboxList();if(tab==="campaigns")document.querySelector("#dashboardContent").innerHTML=`<div class="section-head"><div><p class="kicker">Campaigns</p><h2>Campaigns.</h2></div><button class="btn btn-primary" onclick="openCreateCampaign()">Create Campaign</button></div>${campaignTable(false)}`;if(tab==="share")document.querySelector("#dashboardContent").innerHTML=`<div class="grid grid-3">${ads.slice(0,6).map(a=>`<div class="share-preview-card"><img src="${a.poster_image_url}" style="height:170px;width:100%;object-fit:cover;border-radius:18px"><h3 style="margin-top:14px">${a.title}</h3><p class="muted">${shareDescriptionForAd(a)}</p><div class="action-row"><button class="btn btn-primary" onclick="openSharePack('${a.slug}')">Open Share Pack</button><button class="btn btn-light" data-copy="${publicAdUrl(a.slug)}">Copy Link</button><button class="btn btn-light" onclick="downloadStory('${a.slug}')">Download Story</button></div></div>`).join("")}</div>`;if(tab==="poster")document.querySelector("#dashboardContent").innerHTML=`<div class="grid grid-3">${ads.slice(0,6).map(a=>`<div class="share-preview-card"><img src="${a.poster_image_url}" style="height:170px;width:100%;object-fit:cover;border-radius:18px"><h3 style="margin-top:14px">${a.title}</h3><p class="muted">Prepare story, square, QR, and preview assets.</p><button class="btn btn-primary" onclick="openPosterStudio(\'${a.slug}\')">Open Poster Studio</button></div>`).join("")}</div>`;if(tab==="boost")document.querySelector("#dashboardContent").innerHTML=`<div class="grid grid-3">${boost_plans.map(p=>`<div class="boost-placement"><h3>${p.name}</h3><p class="muted">Preview premium placement before requesting a boost.</p><button class="btn btn-primary" onclick="openBoostPreview(ads[0].slug)">Request access</button></div>`).join("")}</div>`;if(tab==="analytics"){const views=ads.reduce((s,a)=>s+Number(a.views||0),0),interested=ads.reduce((s,a)=>s+interestCount(a.slug),0),rsvpc=ads.reduce((s,a)=>s+rsvpCount(a.slug),0);document.querySelector("#dashboardContent").innerHTML=`<div class="grid grid-3"><div class="stat"><p class="muted">Views</p><h3>${views.toLocaleString()}</h3></div><div class="stat"><p class="muted">Interested</p><h3>${interested}</h3></div><div class="stat"><p class="muted">RSVPs</p><h3>${rsvpc}</h3></div></div>`}if(tab==="profile")document.querySelector("#dashboardContent").innerHTML=`<div class="form-card"><h3>Profile</h3><p class="muted">Manage your promoter profile.</p><div class="form-grid" style="margin-top:18px"><label>Promoter name<input value="Island Vibes Promotions"></label><label>Bio<textarea rows="4">Kingston-based event promoter.</textarea></label><button class="btn btn-primary">Save Profile</button></div></div>`}
function promoTable(admin=false,list=ads){return `<div class="table-wrap"><table><thead><tr><th>Promo</th><th>Status</th><th>Interested</th><th>RSVPs</th><th>Actions</th></tr></thead><tbody>${list.map(ad=>`<tr><td><div class="row-ad"><img src="${ad.poster_image_url}" alt="${ad.title}"><div><strong>${ad.title}</strong><br><span class="muted">${ad.parish||""}</span></div></div></td><td><span class="status ${ad.status}">${ad.status}</span></td><td>${interestCount(ad.slug)}</td><td>${rsvpCount(ad.slug)}</td><td><div class="action-row" style="margin-top:0"><button class="btn btn-light" data-copy="${publicAdUrl(ad.slug)}">Copy Link</button><button class="btn btn-light" data-ad="${ad.slug}">View</button>${admin?`<button class="btn btn-primary" onclick="setStatus('${ad.slug}','active')">Approve</button><button class="btn btn-light" onclick="toggleFeature('${ad.slug}')">Feature</button><button class="btn btn-danger" onclick="setStatus('${ad.slug}','rejected')">Reject</button>`:""}</div></td></tr>`).join("")||`<tr><td colspan="5">Nothing to show.</td></tr>`}</tbody></table></div>`}
function rsvpDashboardList(){return `<div class="action-row" style="justify-content:space-between;margin-bottom:18px"><h3>RSVP List</h3><button class="btn btn-light" onclick="downloadText('yardpromo-rsvps.csv',exportRsvpsCsv())">Export CSV</button></div><div class="grid">${rsvps.length?rsvps.map(rsvpRow).join(""):`<div class="empty"><h3>No RSVPs yet</h3><p class="muted">Submitted RSVPs will appear here.</p></div>`}</div>`}

function campaignTable(admin=false){return `<div class="table-wrap"><table><thead><tr><th>Campaign</th><th>Type</th><th>Status</th><th>Participants</th><th>Actions</th></tr></thead><tbody>${campaigns.map(c=>`<tr><td><strong>${c.title}</strong><br><span class="muted">${campaignPromo(c).title}</span></td><td>${c.type}</td><td><span class="status ${c.status}">${c.status}</span></td><td>${c.participants}</td><td><div class="action-row" style="margin-top:0"><button class="btn btn-light" onclick="location.hash='campaign/${c.slug}'">View</button><button class="btn btn-light" data-copy="${campaignUrl(c.slug)}">Copy Link</button>${admin?`<button class="btn btn-primary">Approve</button><button class="btn btn-light">Feature</button>`:""}</div></td></tr>`).join("")}</tbody></table></div>`}
function adminPage(){const pending=ads.filter(a=>a.status==="pending").length,active=ads.filter(a=>a.status==="active").length,featured=ads.filter(a=>a.is_featured).length;return `<section class="section"><div class="container"><div class="section-head"><div><p class="kicker">Admin</p><h2>Admin dashboard.</h2></div></div><div class="grid grid-4" style="margin-bottom:22px"><div class="stat"><p class="muted">Pending</p><h3>${pending}</h3></div><div class="stat"><p class="muted">Active</p><h3>${active}</h3></div><div class="stat"><p class="muted">Featured</p><h3>${featured}</h3></div><div class="stat"><p class="muted">Claims</p><h3>${claims.length}</h3></div></div><div class="tabs"><button class="active" onclick="renderAdminTab('promos',this)">Pending Promos</button><button onclick="renderAdminTab('claims',this)">Claims</button><button onclick="renderAdminTab('rsvps',this)">RSVPs</button><button onclick="renderAdminTab('interested',this)">Interested</button><button onclick="renderAdminTab('support',this)">Support</button><button onclick="renderAdminTab('inquiries',this)">Inquiries</button><button onclick="renderAdminTab('campaigns',this)">Campaigns</button><button onclick="renderAdminTab('share',this)">Share Images</button><button onclick="renderAdminTab('venues',this)">Venues</button><button onclick="renderAdminTab('promoters',this)">Promoters</button><button onclick="renderAdminTab('roundupbuilder',this)">Roundup Builder</button><button onclick="renderAdminTab('pricing',this)">Pricing</button></div><div id="adminContent"></div></div></section>`}
function renderAdminTab(tab,btn){document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));if(btn)btn.classList.add("active");if(tab==="promos")document.querySelector("#adminContent").innerHTML=promoTable(true,ads.filter(a=>a.status==="pending"));if(tab==="claims")document.querySelector("#adminContent").innerHTML=claims.length?claims.map(c=>`<div class="claim-row"><div><span class="status ${c.status}">${c.status}</span></div><div><h3>${c.target_title}</h3><p class="muted">${c.name} • ${c.business}</p></div><div class="action-row"><button class="btn btn-primary">Approve</button><button class="btn btn-danger">Reject</button></div></div>`).join(""):`<div class="empty"><h3>No claims</h3></div>`;if(tab==="rsvps")document.querySelector("#adminContent").innerHTML=rsvpDashboardList();if(tab==="interested")document.querySelector("#adminContent").innerHTML=interestedDashboardList();if(tab==="support")document.querySelector("#adminContent").innerHTML=supportDashboardHtml();if(tab==="inquiries")document.querySelector("#adminContent").innerHTML=inboxList();if(tab==="campaigns")document.querySelector("#adminContent").innerHTML=campaignTable(true);if(tab==="share")document.querySelector("#adminContent").innerHTML=`<div class="grid grid-3">${ads.slice(0,9).map(a=>`<div class="share-preview-card"><img src="${a.poster_image_url}" style="height:160px;width:100%;object-fit:cover;border-radius:18px"><h3 style="margin-top:14px">${a.title}</h3><div class="action-row"><button class="btn btn-light" onclick="openSharePreviewTool('${a.slug}')">Review</button><button class="btn btn-primary" onclick="toast('Preview refreshed')">Refresh Preview</button><button class="btn btn-light" onclick="toast('Approved for sharing')">Approve</button></div></div>`).join("")}</div>`;if(tab==="venues")document.querySelector("#adminContent").innerHTML=`<div class="grid grid-3">${venues.map(v=>`<div class="venue-card"><img src="${v.image}" style="height:160px;width:100%;object-fit:cover;border-radius:18px"><h3>${v.name}</h3><p class="muted">${v.location}, ${v.parish}</p><button class="btn btn-light" onclick="location.hash='venue/${v.slug}'">View Venue</button></div>`).join("")}</div>`;if(tab==="promoters")document.querySelector("#adminContent").innerHTML=`<div class="grid grid-3">${promoters.map(p=>`<div class="profile-card"><img src="${p.image}" style="height:160px;width:100%;object-fit:cover;border-radius:18px"><h3>${p.name}</h3><p class="muted">${p.type} • ${p.parish}</p><button class="btn btn-light" onclick="location.hash='promoter/${p.slug}'">View Promoter</button></div>`).join("")}</div>`;if(tab==="roundupbuilder")document.querySelector("#adminContent").innerHTML=`<div class="grid grid-3">${activeAds().map(a=>`<div class="share-preview-card"><img src="${a.poster_image_url}" style="height:160px;width:100%;object-fit:cover;border-radius:18px"><h3 style="margin-top:14px">${a.title}</h3><div class="action-row"><button class="btn btn-light" onclick="toast(\'Marked Weekend Pick\')">Weekend Pick</button><button class="btn btn-light" onclick="toast(\'Marked Editor’s Pick\')">Editor’s Pick</button><button class="btn btn-light" onclick="toast(\'Marked Parish Highlight\')">Parish Highlight</button></div></div>`).join("")}</div>`;if(tab==="pricing")document.querySelector("#adminContent").innerHTML=pricingCards()}
function setStatus(slug,status){ads=ads.map(a=>a.slug===slug?{...a,status}:a);saveAll();render();toast("Updated")}
function toggleFeature(slug){ads=ads.map(a=>a.slug===slug?{...a,is_featured:!a.is_featured}:a);saveAll();render();toast("Updated")}
function pricingCards(){const plans=[["Free Launch Ad","JMD $0","Public promo page, poster upload, shareable link"],["Weekend Boost","Coming soon","Higher weekend placement"],["Parish Spotlight","Coming soon","Featured by parish"],["Homepage Featured","Coming soon","Premium homepage placement"],["Promoter Monthly Plan","Coming soon","For regular promoters and businesses"]];return `<div class="grid grid-3">${plans.map(p=>`<article class="price-card"><h3>${p[0]}</h3><h2>${p[1]}</h2><p class="muted">${p[2]}</p></article>`).join("")}</div>`}
function pricingPage(){return `<section class="section"><div class="container"><div class="section-head"><div><p class="kicker">Advertise</p><h2>Free during launch.</h2></div><button class="btn btn-primary" data-route="create">Post Promo</button></div>${pricingCards()}</div></section>`}
function roundupPage(){const picks=activeAds().filter(a=>a.is_weekly_pick),top=[...activeAds()].sort((a,b)=>heatScore(b)-heatScore(a)),food=activeAds().filter(a=>a.category==="Food"),biz=activeAds().filter(a=>["Business","Services","Fashion","Local Deals"].includes(a.category));const block=(title,items)=>`<section style="margin-top:28px"><div class="section-head"><div><p class="kicker">Roundup Builder</p><h2>${title}</h2></div></div><div class="grid grid-3">${items.slice(0,3).map(a=>`<div class="editor-pick">${card(a)}</div>`).join("")||`<div class="empty"><h3>No picks yet</h3></div>`}</div></section>`;return `<section class="section"><div class="container"><div class="page-hero"><p class="kicker" style="color:#f7c600">Weekly Roundup</p><h2>This Weekend in Jamaica.</h2><p>Editor’s picks, parish highlights, food, music, nightlife, and business deals.</p><div class="action-row"><button class="btn btn-gold" data-copy="${location.origin+location.pathname}#roundup">Share roundup</button><button class="btn btn-light" onclick="downloadText('yardpromo-roundup-caption.txt','Here’s what’s happening in Jamaica this weekend — parties, shows, food, deals, and more.')">Copy roundup caption</button><button class="btn btn-light" onclick="toast('Roundup story image ready')">Download story image</button></div></div>${block("Top events",top)}${block("Parish highlights",picks)}${block("Food & brunch",food)}${block("Music & nightlife",top.filter(a=>["Dancehall","Reggae","Party","Stage Show"].includes(a.category)))}${block("Business deals",biz)}${block("New & notable",[...activeAds()].reverse())}</div></section>`}
function rankingsPage(){const list=[...activeAds()].sort((a,b)=>heatScore(b)-heatScore(a)).slice(0,10);return `<section class="section"><div class="container"><div class="section-head"><div><p class="kicker">Rankings</p><h2>Top promotions.</h2><p class="muted">Heat Score measures recent engagement and sharing activity.</p></div></div><div class="grid">${list.map((ad,i)=>`<article class="rank-row"><div class="rank-number">#${i+1}</div><img class="rank-img" src="${ad.poster_image_url}" alt="${ad.title}"><div><h3>${ad.title}</h3><p class="muted">${ad.location}, ${ad.parish}</p></div><div class="score">${heatScore(ad)}/100</div><button class="btn btn-primary" data-ad="${ad.slug}">View</button></article>`).join("")}</div></div></section>`}

function forYouPage(){
  const prefs=JSON.parse(localStorage.getItem("yp_feed_preferences")||"{}");
  let list=[...activeAds()].sort((a,b)=>heatScore(b)-heatScore(a));
  if(prefs.parish) list.sort((a,b)=>(b.parish===prefs.parish)-(a.parish===prefs.parish));
  const labels=["Popular near you","Trending this weekend","Similar to what you viewed","New in Kingston","Food deals near you","Guest list active"];
  return `<section class="section"><div class="container"><div class="page-hero"><p class="kicker" style="color:#f7c600">For You</p><h2>Your discovery feed.</h2><p>Smart picks based on parish, category, popularity, RSVPs, and recent sharing activity.</p><div class="action-row"><button class="btn btn-gold" onclick="openTuneFeed()">Tune Your Feed</button><button class="btn btn-light" onclick="openYardAlerts('feed')">Get Alerts</button></div></div><div class="grid grid-3">${list.slice(0,6).map((ad,i)=>`<div><span class="heat-badge" style="margin-bottom:10px">${labels[i%labels.length]}</span>${card(ad)}</div>`).join("")}</div></div></section>`
}
function pulsePage(){
  const places=["Kingston","Montego Bay","Portmore","Ocho Rios","Spanish Town","St. Andrew","St. Ann","St. Catherine"];
  return `<section class="section"><div class="container"><div class="page-hero"><p class="kicker" style="color:#f7c600">Parish Pulse</p><h2>What’s active across Jamaica.</h2><p>See what is trending by area and discover the strongest promos nearby.</p></div><div class="grid grid-4">${places.map(place=>{const s=getParishStats(place);return `<article class="parish-card"><strong>${place}</strong><p class="muted">${s.list.length||1} active promos</p><div class="pulse-meta"><span>Top: ${s.topCat}</span><span>${s.top?interestCount(s.top.slug):0} interested</span><span>Most RSVP’d</span><span>${s.rsvpTop?rsvpCount(s.rsvpTop.slug):0} RSVPs</span></div><button class="btn btn-primary" onclick="window.presetParish='${place==="Montego Bay"?"St. James":place==="Portmore"||place==="Spanish Town"?"St. Catherine":place==="Ocho Rios"?"St. Ann":place}';navigate('browse')">View Promos</button></article>`}).join("")}</div></div></section>`
}
function weekendBoardPage(){
  const list=[...activeAds()].filter(a=>a.event_date).sort((a,b)=>heatScore(b)-heatScore(a));
  const section=(title,items)=>`<section style="margin-top:26px"><div class="section-head"><div><p class="kicker">Live Weekend Board</p><h2>${title}</h2></div></div><div class="grid">${items.map(ad=>`<article class="board-row"><img src="${ad.poster_image_url}" alt="${ad.title}"><div><h3>${ad.title}</h3><p class="muted">${ad.parish} • ${ad.event_date||"Today"}</p></div><div class="score">${heatScore(ad)}/100 Heat</div><button class="btn btn-primary" data-ad="${ad.slug}">View</button></article>`).join("")||`<div class="empty"><h3>No events listed yet</h3><button class="btn btn-primary" data-route="create">Post Event</button></div>`}</div></section>`;
  return `<section class="section"><div class="container"><div class="page-hero"><p class="kicker" style="color:#f7c600">Weekend Board</p><h2>Live Weekend Board.</h2><p>A fast scan of rising, shared, RSVP’d, and newly added events.</p></div>${section("Rising Fast",list.slice(0,3))}${section("Most Shared",[...list].sort((a,b)=>Number(b.shares||0)-Number(a.shares||0)).slice(0,3))}${section("Most RSVP’d",[...list].sort((a,b)=>rsvpCount(b.slug)-rsvpCount(a.slug)).slice(0,3))}${section("Popular in Kingston",list.filter(a=>a.parish==="Kingston").slice(0,3))}</div></section>`
}

function loginPage(){return `<section class="section"><div class="container"><div class="form-card" style="max-width:540px;margin:auto"><p class="kicker">Login</p><h2>Account access.</h2><div class="form-grid" style="margin-top:18px"><label>Email<input type="email"></label><label>Password<input type="password"></label><button class="btn btn-primary" data-route="dashboard">Continue</button><button class="btn btn-light" data-route="admin">Admin Access</button></div></div></div></section>`}
function simplePage(title,body){return `<section class="section"><div class="container"><div class="panel"><p class="kicker">YardPromo</p><h2>${title}</h2><p class="muted">${body}</p></div></div></section>`}
function openCreateCampaign(){openModal("Create Campaign",`<form id="createCampaignForm" class="form-grid"><label>Promo<select name="promo_slug">${ads.map(a=>`<option value="${a.slug}">${a.title}</option>`).join("")}</select></label><label>Campaign type<select name="type"><option>Share-to-Win</option><option>Vote / Poll</option><option>RSVP / Guest List</option><option>Hashtag Challenge</option><option>Referral</option></select></label><label>Campaign title<input name="title" required></label><label>Prize / reward<input name="reward"></label><div class="form-row"><label>Start date<input name="start_date" type="date"></label><label>End date<input name="end_date" type="date"></label></div><label>Rules & Terms<textarea name="rules" rows="3" required></textarea></label><button class="btn btn-primary">Launch Campaign</button></form>`);document.querySelector("#createCampaignForm").addEventListener("submit",e=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());campaigns=[{id:Date.now(),slug:slugify(data.title)+"-"+Date.now(),status:"active",participants:0,shares:0,votes:0,rsvps:0,referrals:0,hashtag:"",featured:false,...data},...campaigns];closeModal();toast("Campaign created");render()})}
function openModal(title,body){document.querySelector("#modalRoot").innerHTML=`<div class="modal-backdrop"><div class="modal"><div class="modal-head"><div><p class="kicker">YardPromo</p><h3>${title}</h3></div><button class="close" onclick="closeModal()">×</button></div>${body}</div></div>`}
function closeModal(){document.querySelector("#modalRoot").innerHTML=""}
document.body.addEventListener("click",e=>{const r=e.target.closest("[data-route]");if(r)navigate(r.dataset.route);const ad=e.target.closest("[data-ad]");if(ad)location.hash="ad/"+ad.dataset.ad;const c=e.target.closest("[data-copy]");if(c){navigator.clipboard?.writeText(c.dataset.copy);toast("Copied")}})
window.addEventListener("hashchange",readHash);
function render(){document.querySelectorAll("[data-route]").forEach(b=>b.classList.toggle("active",b.dataset.route===route));const app=document.querySelector("#app");if(route==="home")app.innerHTML=homePage();else if(route==="browse"){app.innerHTML=browsePage();setupBrowse()}else if(route==="foryou")app.innerHTML=forYouPage();else if(route==="pulse")app.innerHTML=pulsePage();else if(route==="weekendboard")app.innerHTML=weekendBoardPage();else if(route==="calendar"){app.innerHTML=calendarPage();renderCalendar()}else if(route==="weekend")app.innerHTML=weekendPage();else if(route==="campaigns")app.innerHTML=campaignsPage();else if(route==="campaign")app.innerHTML=campaignDetailPage();else if(route==="create"){app.innerHTML=createPage();setupCreate()}else if(route==="dashboard"){app.innerHTML=dashboardPage();renderDashboardTab("promos",document.querySelector(".tabs button"))}else if(route==="admin"){app.innerHTML=adminPage();renderAdminTab("promos",document.querySelector(".tabs button"))}else if(route==="pricing")app.innerHTML=pricingPage();else if(route==="roundup")app.innerHTML=roundupPage();else if(route==="rankings")app.innerHTML=rankingsPage();else if(route==="login")app.innerHTML=loginPage();else if(route==="ad")app.innerHTML=detailPage();else if(route==="promoter")app.innerHTML=profilePage();else if(route==="venue")app.innerHTML=venuePage();else if(route==="about")app.innerHTML=simplePage("About","YardPromo helps people discover promotions, events, venues, and local businesses across Jamaica.");else if(route==="contact")app.innerHTML=simplePage("Contact","For support, partnerships, and advertising opportunities, contact the YardPromo team.");else if(route==="terms")app.innerHTML=simplePage("Terms","Promoters are responsible for accurate event, pricing, and offer information.");else if(route==="privacy")app.innerHTML=simplePage("Privacy","RSVP and inquiry details are shared only with the relevant organizer.");else if(route==="policy")app.innerHTML=simplePage("Personalization Policy","Personalization is based on your selected interests, parish, and browsing context. You can manage preferences anytime.");else app.innerHTML=homePage();document.body.classList.toggle("has-mobile-bar",route==="ad");window.scrollTo(0,0)}
readHash();

document.body.addEventListener("keydown",e=>{
  const poster=e.target.closest?.(".mini-poster[data-ad]");
  if(poster && (e.key==="Enter" || e.key===" ")){
    e.preventDefault();
    location.hash="ad/"+poster.dataset.ad;
  }
});

</script>
</body>
</html>
